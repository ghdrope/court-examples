apiVersion: v1
kind: Pod
metadata:
  name: api-worker
  labels:
    app: api-worker
    tier: backend
  annotations:
    court.dev/repository: https://github.com/ghdrope/court-examples
spec:
  restartPolicy: Never
  containers:
    - name: api
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          echo "[api] Starting HTTP service..."
          sleep 2
          echo "[api] Connecting to database at postgres:5432..."
          sleep 15
          exit 0

    - name: worker
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          echo "[worker] Starting background processor..."
          sleep 3
          echo "[worker] Fetching job from queue..."
          sleep 2
          exit 1